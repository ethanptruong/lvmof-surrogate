# Quarterly full retrain of the COMPASS surrogate model.
#
# Runs on GitHub's runners (4 CPU / 16 GB - faster than the Fly VM, and the
# live site stays responsive while it works). Pulls the CURRENT experiment
# Excel off the Fly volume, re-tunes every pipeline from scratch on it, then
# pushes the new checkpoints and evaluation figures back. The running app
# sees the new checkpoints immediately (they live on the volume); figures are
# hot-copied into the app and re-applied on every boot by docker-entrypoint.sh.
#
# Schedule: first Friday evening (US Pacific) of Jan / Apr / Jul / Oct.
# The cron fires every Saturday 04:00 UTC (= Fri 8 PM PST / 9 PM PDT) in
# those months; the guard job lets only the month's first one through.
#
# Manual runs (Actions tab -> Run workflow):
#   full    - fresh Optuna search on the latest data (default; several hours)
#   refresh - keep current hyperparameters; re-featurize, re-fit and
#             regenerate all figures (took ~4.8 h on the 2026-06 test run -
#             the contrastive-learning net refits dominate on CPU)
#   resume  - continue a previous tuning run that ran out of time
#
# A full tune does not fit in one 6 h job on CPU runners. When the training
# step hits its time limit, progress (Optuna trials + featurized data) is
# saved to the volume and the workflow DISPATCHES ITSELF in resume mode,
# chaining until training completes (bounded by MAX_ATTEMPTS). A Friday-night
# start may finish over the weekend; nothing is pushed to the live site until
# a chain link succeeds end-to-end.
#
# Requires the FLY_API_TOKEN repo secret (shared with backup-data.yml).

name: Quarterly model retrain

on:
  schedule:
    - cron: "0 4 * 1,4,7,10 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "full = fresh Optuna search; refresh = re-fit + plots only; resume = continue interrupted search"
        type: choice
        options: [full, refresh, resume]
        default: full
      attempt:
        description: "Chain counter (used by self-dispatched resume runs - leave at 1)"
        type: string
        default: "1"

permissions:
  contents: read
  actions: write

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  APP: mof-compass
  MAX_ATTEMPTS: 8

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          # Manual runs always proceed. Scheduled runs proceed only on the
          # Saturday (UTC) right after the month's FIRST Friday (Pacific),
          # i.e. UTC day-of-month 2-8.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(date -u +%-d)" -le 8 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  retrain:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (mirrors the Dockerfile)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install mordred==1.2.0 --no-deps
          pip install filelock

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake the app machine
        run: curl -s --max-time 120 https://mof-compass.fly.dev/_stcore/health || true

      - name: Pull the latest lab data from the live volume
        run: |
          # The data dir (experiment Excel, COSMO solvent profiles, sigma
          # profile index) is gitignored - the live volume is the source of
          # truth. Grab the whole directory.
          mkdir -p checkpoints
          flyctl ssh console -a "$APP" -q -C "tar czf /tmp/labdata.tar.gz -C /data data"
          flyctl ssh sftp get -a "$APP" /tmp/labdata.tar.gz labdata.tar.gz
          flyctl ssh console -a "$APP" -q -C "rm /tmp/labdata.tar.gz"
          tar xzf labdata.tar.gz && rm labdata.tar.gz
          # SMILES featurization cache - keyed by molecule only, safe to
          # reuse, saves a lot of mordred/COSMO time.
          flyctl ssh sftp get -a "$APP" \
            /data/checkpoints/smiles_cache.pkl checkpoints/smiles_cache.pkl || true
          # Mirror the NAMES of the live site's BO calibration plots (PNGs are
          # gitignored, so the checkout has none). The end-of-pipeline
          # calibration refresh regenerates every docs/bo_calibration_*.png it
          # sees - empty placeholders are enough for it to know which
          # acquisition×surrogate plots the site is showing.
          mkdir -p docs
          flyctl ssh console -a "$APP" -q -C "ls /data/docs" | tr -d '\r' \
            | grep -E '^bo_calibration_.*\.png$' \
            | while read -r f; do touch "docs/$f"; done || true
          ls docs
          ls -la data | head -20

      - name: Pull existing tuning state (refresh / resume only)
        if: github.event.inputs.mode == 'refresh' || github.event.inputs.mode == 'resume'
        run: |
          flyctl ssh sftp get -a "$APP" \
            /data/checkpoints/best_params.pkl checkpoints/best_params.pkl || true
          flyctl ssh sftp get -a "$APP" \
            /data/checkpoints/optuna.db checkpoints/optuna.db || true
          # Resume runs also reuse the featurized-data caches saved by the
          # interrupted run, skipping ~1 h of re-featurization per chain link.
          if [ "${{ github.event.inputs.mode }}" = "resume" ]; then
            flyctl ssh sftp get -a "$APP" \
              /data/checkpoints/data.pkl checkpoints/data.pkl || true
            flyctl ssh sftp get -a "$APP" \
              /data/checkpoints/features.pkl checkpoints/features.pkl || true
          fi

      - name: Run the training pipeline
        id: train
        # The step gets cut at 320 min so the save/chain steps below still
        # have room inside the job's 345 min ceiling.
        timeout-minutes: 320
        continue-on-error: true
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          touch .retrain_marker && sleep 1
          if [ "$MODE" = "refresh" ]; then
            python main.py --skip-tuning
          else
            python main.py
          fi

      # Training ran out of time (or failed): save the Optuna trial state and
      # the featurized-data caches so a resume run picks up where this one
      # stopped instead of starting over.
      - name: Save tuning progress for resume
        if: steps.train.outcome != 'success'
        run: |
          for f in optuna.db data.pkl features.pkl smiles_cache.pkl; do
            if [ -f "checkpoints/$f" ]; then
              flyctl ssh console -a "$APP" -q -C "rm -f /data/checkpoints/$f" || true
              flyctl ssh sftp put -a "$APP" "checkpoints/$f" "/data/checkpoints/$f" || true
            fi
          done

      - name: Chain a resume run
        if: steps.train.outcome != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "refresh" ]; then
            echo "::error::Refresh run failed - nothing to resume (no tuning involved). Check the training log."
            exit 1
          fi
          ATTEMPT="${{ github.event.inputs.attempt || '1' }}"
          if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
            NEXT=$((ATTEMPT + 1))
            echo "Training did not finish (attempt $ATTEMPT/$MAX_ATTEMPTS); dispatching resume run #$NEXT."
            curl -sf -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/quarterly-retrain.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"mode\":\"resume\",\"attempt\":\"$NEXT\"}}"
          else
            echo "::error::Training still not finished after $ATTEMPT attempts - giving up. Investigate, then re-run manually in resume mode."
            exit 1
          fi

      - name: Push new checkpoints to the live volume
        if: steps.train.outcome == 'success'
        run: |
          for f in best_params.pkl optuna.db data.pkl features.pkl smiles_cache.pkl; do
            if [ -f "checkpoints/$f" ]; then
              flyctl ssh console -a "$APP" -q -C "rm -f /data/checkpoints/$f"
              flyctl ssh sftp put -a "$APP" "checkpoints/$f" "/data/checkpoints/$f"
            fi
          done

      - name: Push regenerated figures and apply them to the running site
        if: steps.train.outcome == 'success'
        run: |
          # Everything the pipeline (re)wrote at the project root this run.
          find . -maxdepth 1 \( -name '*.png' -o -name '*.csv' \) -newer .retrain_marker -print0 \
            | tar czf artifacts.tar.gz --null -T -
          tar tzf artifacts.tar.gz | head -50
          flyctl ssh console -a "$APP" -q -C "rm -f /data/artifacts.tar.gz"
          flyctl ssh sftp put -a "$APP" artifacts.tar.gz /data/artifacts.tar.gz
          flyctl ssh console -a "$APP" -q -C "mkdir -p /data/artifacts"
          flyctl ssh console -a "$APP" -q -C "tar xzf /data/artifacts.tar.gz -C /data/artifacts"
          # Hot-apply to the running app (the entrypoint redoes this on boot).
          flyctl ssh console -a "$APP" -q -C "cp -a /data/artifacts/. /app/"
          flyctl ssh console -a "$APP" -q -C "rm /data/artifacts.tar.gz"

      - name: Push regenerated BO calibration plots
        if: steps.train.outcome == 'success'
        run: |
          # The pipeline re-runs surrogate calibration at the end of every
          # retrain and writes docs/bo_calibration_*.png. On the app, docs/
          # is a symlink to /data/docs (the volume), so putting the files
          # there makes them live immediately AND persistent - no boot-time
          # overlay needed (unlike the root-level artifacts above).
          find docs -maxdepth 1 -name 'bo_calibration_*.png' -newer .retrain_marker \
            | while read -r f; do
                echo "pushing $f"
                flyctl ssh console -a "$APP" -q -C "rm -f /data/$f" || true
                flyctl ssh sftp put -a "$APP" "$f" "/data/$f"
              done

      - name: Verify the site is still healthy
        if: steps.train.outcome == 'success'
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 120 https://mof-compass.fly.dev/_stcore/health)
          echo "health: HTTP $code"
          test "$code" = "200"
